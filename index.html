 var SWITCH_MS = 30 * 60 * 1000; // 30 minutos em ms
 var startTime = Date.now();

 function currentPool() {
 return (Date.now() - startTime) < SWITCH_MS ? msgsEarly : msgsLate;
 }

 var chatContainer = document.getElementById('chat-messages');
 var earlyIdx = 0;
 var lateIdx = 0;

 // Pré-popular com as 5 primeiras mensagens do pool inicial
 for (var i = 0; i < 5; i++) {
 addChatMessage(msgsEarly[i]);
 }
 earlyIdx = 5;

 function addChatMessage(data) {
 var div = document.createElement('div');
 div.className = 'chat-msg';
 div.innerHTML =
 '<span class="chat-user" style="color:' + data.color + '">' + escapeHtml(data.user) + ':</span>' +
 '<span class="chat-text">' + escapeHtml(data.msg) + '</span>';
 chatContainer.appendChild(div);
 chatContainer.scrollTop = chatContainer.scrollHeight;
 while (chatContainer.children.length > 60) {
 chatContainer.removeChild(chatContainer.firstChild);
 }
 }

 function scheduleNextChat() {
 var delay = Math.floor(Math.random() * (5000 - 2000 + 1)) + 2000;
 setTimeout(function () {
 var pool = currentPool();
 var idx = pool === msgsEarly ? earlyIdx++ : lateIdx++;
 addChatMessage(pool[idx % pool.length]);
 scheduleNextChat();
 }, delay);
 }
 scheduleNextChat();

 function escapeHtml(str) {
 return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
 }
